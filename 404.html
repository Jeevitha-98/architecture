<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Stackly</title>
    
    <!-- Verified Google Fonts CDN Infrastructure Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Verified FontAwesome Vector Icon Library CDN Link -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <!-- SELF-CONTAINED EMBEDDED INLINE STYLES PREVENT BROKEN PATHS -->
    <style>
      :root {
          --bg-dark: #111412;
          --accent-gold: #AF9272;
          --white: #FFFFFF;
          --font-serif: 'Cinzel', serif;
          --font-sans: 'Inter', sans-serif;
          --ease-premium: cubic-bezier(0.25, 1, 0.5, 1);
      }

      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      .error-body-shroud {
          background-color: var(--bg-dark);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 2rem;
          overflow: hidden;
      }

      .error-view-terminal {
          max-width: 650px;
          width: 100%;
          text-align: center;
          display: flex;
          flex-direction: column;
          align-items: center;
          opacity: 0;
          transform: translateY(20px);
          animation: errorFadeIn 1.2s var(--ease-premium) forwards 0.2s;
      }

      .error-huge-metric {
          font-family: var(--font-serif);
          font-size: clamp(6rem, 12vw, 9.5rem);
          font-weight: 600;
          color: var(--accent-gold);
          line-height: 1;
          margin-bottom: 1.5rem;
          letter-spacing: 0.1rem;
      }

      .error-heading-title {
          font-family: var(--font-sans);
          font-size: clamp(1.8rem, 4vw, 2.5rem);
          font-weight: 600;
          color: var(--white);
          margin-bottom: 1.5rem;
          letter-spacing: -0.01rem;
      }

      .error-descriptive-summary {
          font-family: var(--font-sans);
          font-size: 1.05rem;
          color: rgba(255, 255, 255, 0.65);
          line-height: 1.6;
          font-weight: 300;
          max-width: 520px;
          margin-bottom: 3.5rem;
      }

      /* Custom pill format navigation CTA layout matching your wireframe design guidelines */
      .error-pill-cta {
          background-color: var(--white);
          color: var(--bg-dark);
          padding: 1.1rem 2.8rem;
          font-size: 0.9rem;
          font-weight: 600;
          font-family: var(--font-sans);
          text-decoration: none;
          border-radius: 40px;
          display: inline-flex;
          align-items: center;
          gap: 0.65rem;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
          transition: all 0.4s var(--ease-premium);
      }

      .error-pill-cta i {
          font-size: 0.75rem;
          transition: transform 0.4s var(--ease-premium);
      }

      .error-pill-cta:hover {
          background-color: var(--accent-gold);
          color: var(--white);
          transform: translateY(-3px);
          box-shadow: 0 15px 35px rgba(175, 146, 114, 0.3);
      }

      .error-pill-cta:hover i {
          transform: translate(2px, -2px);
      }

      /* Entrance Animation Keyframe Logic */
      @keyframes errorFadeIn {
          from {
              opacity: 0;
              transform: translateY(20px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }
    </style>
  </head>
  <body class="error-body-shroud">
    
    <!-- CENTRAL TERMINAL VIEW CONTROLLER CONSOLE -->
    <div class="error-view-terminal">
        <h1 class="error-huge-metric">404</h1>
        <h2 class="error-heading-title">Oops! Page Not Found</h2>
        <p class="error-descriptive-summary">The page you're looking for doesn't exist or has been moved. Let's get you back to building something great.</p>
        
        <div class="error-action-deck">
            <!-- Smooth return route steps directly back out into the home layout container -->
            <a href="index.html" class="error-pill-cta">
                Back To Home <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
        </div>
    </div>

  </body>
</html>
